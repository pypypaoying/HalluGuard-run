# Stage 9 candidate 1: frequency-specific trigger repair.

seed: 7

thresholds:
  quantiles: [0.90, 0.95, 0.975, 0.99]
  default_quantile: 0.95
  source_split: val

correction:
  lambda_trend_values: [0.0, 0.1]
  lambda_freq_values: [0.0, 0.5, 0.8]
  default_lambda_trend: 0.0
  default_lambda_freq: 0.8
  high_freq_cutoff_ratio: 0.5
  freq_score_mode: curvature_excess
  smoothing_window: 5
  turning_point_guard: true
  turning_point_guard_min_score: 0.05
  max_trend_adjustment_ratio: 0.02
  validation_calibrated_policy:
    enabled: true
    write_diagnostics: true
    objective: mse
    candidate_quantiles: [0.90, 0.95, 0.975, 0.99]
    margin_factors: [0.0, 0.5, 1.0, 2.0]
    lambda_trend_values: [0.0, 0.1]
    lambda_freq_values: [0.0, 0.5, 0.8]
    require_positive_gain: true
    min_relative_gain_pct: 0.0
    correction_rate_penalty: 0.002
    random_seeds: [1101, 2202, 3303, 4404, 5505]

variants:
  - no_correction
  - naive_smoothing
  - matched_smoothing_control
  - trend_only
  - frequency_only
  - trend_frequency
  - random_trigger

outputs:
  results_dir: experiments/halluguard/results/stage9_mechanism_separation
