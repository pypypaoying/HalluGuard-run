name: halluguard-run
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy>=1.26
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - pyyaml>=6.0
  - tqdm>=4.66
  - pip:
      # CPU-safe default. For CUDA servers, replace this with the matching
      # PyTorch install command from https://pytorch.org/get-started/locally/.
      - torch>=2.1
