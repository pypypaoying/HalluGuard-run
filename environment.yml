name: halluguard-run
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy>=1.26
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - pyyaml>=6.0
  - tqdm>=4.66
  - matplotlib>=3.8
  - requests>=2.31
  - pip:
      # CPU-safe default. For CUDA servers, replace this with the matching
      # PyTorch install command from https://pytorch.org/get-started/locally/.
      - torch>=2.1
      - einops>=0.8
      - datasets>=2.18
      - huggingface_hub>=0.23
      - tensorboard>=2.15
      - patool>=2.0
      - reformer-pytorch>=1.4
      - local-attention>=1.9
